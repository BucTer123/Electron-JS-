<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeWidget</title>
</head>
<style>
    body {
        background: white;
        color: black;
        font-family: sans-serif;
        font-size: medium;
        font-weight: bolder;
        font-style: initial;
        padding: 0;
        margin: 0;
        max-width: 1080px;
        width: 100%;
        max-height: 1920px;
        height: 100%;
        display: flex;
    }

    button {
        background: black;
        color: whitesmoke;
        padding: 10px;
        margin: 5px;
        opacity: 1;
        border: 1px solid gray;
    }

    button:focus {
        background: whitesmoke;
        color: black;
        border: 1px solid gray;
    }

    button:hover {
        opacity: 0.7;
        transform: translateY(4px);
    }

    button:active{
        opacity: 0.3;
        transform: translateX(5px);
    }
</style>
<body>
    <button id="time_now" type="button">Time</button>
</body>
<script>
    const btn1 = document.getElementById("time_now");

    btn1.addEventListener("click", function () {
       const now = new Date();
       const hours = now.getHours().toString().padStart(2, '0');
       const minutes = now.getMinutes().toString().padStart(2, '0');
       const seconds = now.getSeconds().toString().padStart(2, '0');

</script>
</html>
