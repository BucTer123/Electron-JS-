<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" >
	<title>UI</title>
</head>
<style>
	body {
		background: whitesmoke;
		color: black;
		font-family: sans-serif;
		font-size: medium;
		font-weigth: bolder;
		font-style: initial;
		padding: 0;
		margin: 0;
	}
	
	input {
		background: ghostwhite;
		color: black;
		padding: 14px;
		margin: 7px;
		border: 1px solid dimgray;
		opacity: 1;
	}
	
	input:focus {
		background: black;
		color: whitesmoke;
		border: 1px solid blue;
		opacity: 0.9;
	}
	
	audio {
		background: white;
		color: black;
		border: 1px solid black;
	}
	
	audio:focus {
		border: 1px solid blue;
	}
</style>
<body>
	<input id="fl" type="file" />
	<br><br>
	
	<audio id="pl" accept="audio/*" ></audio>
</body>
<script>
	const f = document.getElementById("fl");
	const p = document.getElementById("pl");
	
	const file = this.files[0];
	f.addEventListener("change", function () {
		if (file) {
			const url = URL.createObjectURL(file);
			p.src = url;
			p.play();
		}
	});
</script>
</html>
