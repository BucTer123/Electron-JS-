<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<style>
    #map {
        width: 100%;
        height: 100vh;
    }
</style>
<body>
    <div id="map"></div>
</body>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([48.28569967698587, 25.933914887867420])

    L.tileLayer('https://{s}.basemaps.cartocnd.com/light_all/{z}/{x}/{y}.png', {
        attribution:'&cipy; OpenStreetMap & CartoDB'
    }).addTo(map);
</script>
</html>
