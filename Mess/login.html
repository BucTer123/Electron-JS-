<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8" >
	<title>Login</title>
</head>
<style>
	body {
		background: white;
		color: black;
		font-family: sans-serif;
		font-size: medium;
		font-weight: bolder;
		font-style: initial;
		padding: 0;
		margin: 0;
		max-width: 1920px;
		width: 100%;
		max-height: 1080px;
		height: 100vh;
	}
	
	.container-login {
		background: white;
		color: black;
		padding: 192px;
		margin: 108px;
		border: 1px solid black;
	}
	
	.container-login:focus {
		border: 1px solid blue;
	}
	
	input {
		background: whitesmoke;
		color: black;
		padding: 18px;
		margin: 9px;
		border: 1px solid dimgray;
		opacity: 1;
	}
	
	input:focus {
		background: black;
		color: whitesmoke;
		border; 1px solid blue;
		opacity: 0.9;
	}
	
	button {
		background: black;
		color: white;
		border: 1px solid dimgray;
		opacity: 1;
		padding: 14px;
		margin: 7px;
	}
	
	button:focus {
		background: white;
		color: black;
		border: 1px solid blue;
		opacity: 0.9;
	} 
	
	button:hover {
		opacity: 0.7;
		transform: translateY(4px);
	}
	
	button:active {
		opacity: 0.3;
		transform: translateX(5px);
	}
</style>
<body>
	<div class="container-login">
		<input id="write_username" type="text" />
		<input id="write_password" type="password" />
		<button id="login_button" type="button">Login</button>
	</div>
	
</body>
<script>
	const usr = document.getElementById("write_username");
	const psw = document.getElementById("write_password");
	const btn = document.getElementById("login_button");
	
	btn.addEventListener("click", function () {
		if (usr.value == "" || psw.value == "") {
			window.alert("ERROR!: write username and password! ");
		} else {
			window.location.href = "main.html";
		}
	});
	
	document.getElementById("keydown", function () {
		if (event.key == "enter") {
			window.location.href = "main.html";
		}
	});
</script>
</html>
