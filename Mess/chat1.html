<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" >
	<title>Chat1 : BIBA</title>
</head>
<style>
	body {
		background: white;
		color: black;
		font-family: sans-serif;
		font-size: medium;
		font-weight: bolder;
		font-style: initial;
		padding: 0;
		margin: 0;
		max-width: 1920px;
		width: 100%;
		max-height: 1080px;
		height: 100vh;
	}
	
	.write_chat1 {
		background: whitesmoke;
		color: black;
		padding: 50px;
		margin: 25px;
		border: 1px solid dimgray;
	}
	
	.write_chat1:focus {
		border: 1px solid blue;
	}
	
	input {
	background: white;
	color: black;
	padding: 18px;
	margin 9px;
	border: 1px solid dimgray;
	opacity: 1;
}

input:focus {
	background: black;
	color: white;
	border: 1px solid blue;
	opacity: 1;
}

button {
	background: black;
	color: white;
	padding: 16px;
	margin: 8px;
	opacity: 1;
	border: 1px solid dimgray;
}

button:focus {
	background: white;
	color: black;
	border: 1px solid blue;
	opacity: 0.9;
}

button:hover {
	opacity: 0.7;
	transform: translateY(4px);
}

button:active {
	opacity: 0.3;
	transform: translateX(5px);
}
</style>
<body>
	<button id="message" type="button">Hi!</button>
	
	<div class="write_chat1">
		<input id="input_chat1" type="text" />
		<button id="button_chat1" type="button">Send</button>
	<div>
</body>
<script>
	const msg1_chat1 = document.getElementById("message");
	const msg2_chat1 = document.getElementById("button_chat1");
	const inp1_chat1 = document.getElementById("input_chat1");
	
	msg1_chat1.addEventListener("click", function () {
		window.alert("Bot1 : Hi!");
	});
	
	msg2_chat1.addEventListener("click", function () {
		const c = inp1_chat1.value;
		
		const c2 = "User : " + c2;
		
		window.alert("Bot1: Hi");
		window.alert(c2);
	});
</script>
</html>
